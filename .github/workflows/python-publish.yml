name: Upload Python Package

on:
  release:
    types: [created]

jobs:
  deploy:

    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@v6
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "0.11.2"
    - name: Install Python
      run: uv python install
    - name: Build
      run: uv build
    - name: Smoke test (wheel)
      run: uv run --isolated --no-project --with dist/*.whl tests/test_promql.py
    - name: Smoke test (source distribution)
      run: uv run --isolated --no-project --with dist/*.tar.gz tests/test_promql.py
    - name: Publish
      run: uv publish
